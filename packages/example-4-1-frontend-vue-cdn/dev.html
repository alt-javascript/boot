<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@alt-javascript/boot — Vue CDN Example (local dev)</title>

  <!--
    Local import map — resolves packages via the dev server's /node_modules/ route.
    Run: npm run serve  then open http://localhost:3000/dev
    No internet connection required.
  -->
  <script type="importmap">
  {
    "imports": {
      "vue":                           "/node_modules/vue/dist/vue.esm-browser.js",
      "@alt-javascript/common":        "/node_modules/@alt-javascript/common/dist/alt-javascript-common-esm.js",
      "@alt-javascript/config":        "/node_modules/@alt-javascript/config/dist/alt-javascript-config-esm.js",
      "@alt-javascript/logger":        "/node_modules/@alt-javascript/logger/dist/alt-javascript-logger-esm.js",
      "@alt-javascript/cdi":           "/node_modules/@alt-javascript/cdi/dist/alt-javascript-cdi-esm.js",
      "@alt-javascript/boot":          "/node_modules/@alt-javascript/boot/dist/alt-javascript-boot-esm.js",
      "@alt-javascript/boot-vue":      "/node_modules/@alt-javascript/boot-vue/dist/alt-javascript-boot-vue-esm.js"
    }
  }
  </script>

  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    input[type=text] { padding: 0.4rem 0.6rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 0.4rem 0.8rem; font-size: 1rem; cursor: pointer; margin-left: 0.4rem; border-radius: 4px; border: 1px solid #bbb; }
    button.primary { background: #42b883; color: white; border-color: #42b883; }
    ul { list-style: none; padding: 0; margin-top: 1rem; }
    li { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid #eee; }
    li span { flex: 1; }
    li.done span { text-decoration: line-through; color: #aaa; }
    .banner { font-size: 0.75rem; color: #999; margin-top: 2rem; }
  </style>
</head>
<body>
  <div id="app">Loading…</div>

  <script type="module">
    import { createApp, ref } from 'vue';
    import { ApplicationContext, Context, Singleton } from '@alt-javascript/cdi';
    import { EphemeralConfig } from '@alt-javascript/config';
    import { LoggerFactory, LoggerCategoryCache } from '@alt-javascript/logger';
    import { TodoService } from './src/services.js';

    const config = new EphemeralConfig({
      boot: { 'banner-mode': 'off' },
      app: { name: 'Vue CDN Todo (local dev)', version: '1.0.0' },
      logging: { level: { ROOT: 'info' } },
    });

    // Provide CDI infrastructure singletons explicitly — normally Boot.boot() does this.
    const loggerCategoryCache = new LoggerCategoryCache();
    const loggerFactory = new LoggerFactory(config, loggerCategoryCache);

    const context = new Context([
      new Singleton({ Reference: config, name: 'config' }),
      new Singleton({ Reference: loggerFactory, name: 'loggerFactory' }),
      new Singleton({ Reference: loggerCategoryCache, name: 'loggerCategoryCache' }),
      new Singleton(TodoService),
    ]);
    const appCtx = new ApplicationContext({ contexts: [context], config });
    await appCtx.start({ run: false });

    const todoService = appCtx.get('todoService');

    const App = {
      setup() {
        const todos = ref(todoService.getAll());
        const newTitle = ref('');

        function addTodo() {
          if (!newTitle.value.trim()) return;
          todoService.add(newTitle.value.trim());
          todos.value = todoService.getAll();
          newTitle.value = '';
        }

        function toggleTodo(id) {
          todoService.toggle(id);
          todos.value = todoService.getAll();
        }

        function removeTodo(id) {
          todoService.remove(id);
          todos.value = todoService.getAll();
        }

        return { todos, newTitle, addTodo, toggleTodo, removeTodo };
      },

      template: `
        <h1>@alt-javascript/boot — Vue CDN (local dev)</h1>
        <p class="subtitle">CDI beans in Vue via ApplicationContext. No build step. Local packages.</p>

        <div>
          <input v-model="newTitle" type="text" placeholder="New todo…" @keyup.enter="addTodo" />
          <button class="primary" @click="addTodo">Add</button>
        </div>

        <ul>
          <li v-for="todo in todos" :key="todo.id" :class="{ done: todo.done }">
            <input type="checkbox" :checked="todo.done" @change="toggleTodo(todo.id)" />
            <span>{{ todo.title }}</span>
            <button @click="removeTodo(todo.id)">✕</button>
          </li>
        </ul>

        <p class="banner">Powered by @alt-javascript/boot · CDI via @alt-javascript/cdi · Local packages</p>
      `,
    };

    const vueApp = createApp(App);
    vueApp.provide('applicationContext', appCtx);
    vueApp.provide('todoService', todoService);
    vueApp.mount('#app');
  </script>
</body>
</html>
